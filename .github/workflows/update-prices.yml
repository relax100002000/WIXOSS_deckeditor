name: Update card prices

on:
  schedule:
    # 每天 UTC 18:00 = 台灣 02:00 (避開 yuyu-tei 白天尖峰)
    - cron: '0 18 * * *'
  # 允許在 GitHub UI 上手動觸發
  workflow_dispatch:

# 讓本 workflow 能 push 回 repo
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scraper.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add price_info.json js/price_info.js
          if git diff --staged --quiet; then
            echo "No price changes."
          else
            git commit -m "chore: update card prices ($(date -u +'%Y-%m-%d'))"
            git push
          fi
