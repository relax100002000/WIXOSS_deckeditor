name: Update card prices

on:
  # NOTE: 排程已停用 — yuyu-tei 封鎖 GitHub Actions 的 IP 範圍，
  # 改由本機 update_prices.bat + Windows Task Scheduler 處理。
  # 此 workflow 保留只作手動測試用（從本機觸發 GitHub Actions 跑爬蟲也會失敗，
  # 純粹保留 yml 給後續萬一 yuyu-tei 解封時可以快速恢復）。
  workflow_dispatch:

# 讓本 workflow 能 push 回 repo
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run scraper
        run: node scraper.js
        # 加 --trace-warnings 讓錯誤訊息更詳細，方便除錯

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add price_info.json js/price_info.js
          if git diff --staged --quiet; then
            echo "No price changes."
          else
            git commit -m "chore: update card prices ($(date -u +'%Y-%m-%d'))"
            git push
          fi
