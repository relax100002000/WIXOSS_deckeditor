name: Update card prices

on:
  # NOTE: 排程已停用 — yuyu-tei 封鎖 GitHub Actions 的 IP 範圍，
  # 改由本機 update_prices.bat + Windows Task Scheduler 處理。
  # 此 workflow 保留只作手動測試用（從本機觸發 GitHub Actions 跑爬蟲也會失敗，
  # 純粹保留 yml 給後續萬一 yuyu-tei 解封時可以快速恢復）。
  workflow_dispatch:

# 讓本 workflow 能 push 回 repo
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run scraper (current card base only)
        run: node scraper.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add price_info.json js/price_info.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            # Pull the ISO timestamp out of price_info.json so the commit
            # message records the exact moment the data was scraped — keeps
            # the website's "Last update" display in sync with git history.
            updated=$(node -e "process.stdout.write(require('./price_info.json').updated||'')")
            [ -z "$updated" ] && updated=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            git commit -m "chore: update card prices ($updated)"
            git push
          fi
